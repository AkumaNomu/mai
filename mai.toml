[cache]
root_dir = "data/cache"
audio_dir = "data/audio_cache"

[analysis]
refresh_cache = false
edge_seconds = 30.0
silence_top_db = 35.0
flow_profile = "deep-dj"
resource_profile = "background"
download_workers = 4
analysis_workers = 12
delete_audio_after_analysis = true
no_audio_analysis = false

[generation]
num_playlists = 1
allow_reuse = false
genre_clusters = 8
beam_width = 8
candidate_width = 25
rate_transitions = true
print_recommended_order = true

[training]
output_path = "data/training/positive_transitions.csv"
max_search_results = 5
metadata_workers = 4
search_workers = 4
label = "excellent"
label_source = "youtube_mix_curation"

[[training.channels]]
name = "mai"
